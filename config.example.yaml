# Скопируйте в config.yaml и заполните секреты.
# config.yaml не попадает в git.

app:
  # streamlit | telegram | console
  interface: streamlit
  logging_enabled: true

weatherapi:
  url: http://api.weatherapi.com/v1
  method: /current.json
  api_key: YOUR_KEY_HERE
  city: Moscow

telegram:
  token: YOUR_TOKEN_HERE

logging:
  host: localhost
  port: 5432
  database: iter_template_stage
  user: roman
  password: YOUR_PASSWORD_HERE
  schema: template

# Роль tester — для слоя тестов на stage (пароль задаётся в postgres)
testing:
  user: tester
  password: YOUR_TESTER_PASSWORD_HERE
  database: iter_template_stage
  schema: template

paths:
  jokes_file: data/jokes.json
