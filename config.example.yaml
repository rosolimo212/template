# Скопируйте в config.yaml и заполните секреты.
# config.yaml не попадает в git.
#
# База communication — одно имя на stage и prod.
# Схемы внутри (template, …) совпадают; данные разделены разными серверами postgres.

app:
  # streamlit | telegram | console
  interface: streamlit
  logging_enabled: true

weatherapi:
  url: http://api.weatherapi.com/v1
  method: /current.json
  api_key: YOUR_KEY_HERE
  city: Moscow

telegram:
  token: YOUR_TOKEN_HERE

logging:
  host: localhost
  port: 5432
  database: communication
  user: roman
  password: YOUR_PASSWORD_HERE
  schema: template

# Роль tester — для слоя тестов (пароль задаётся в postgres)
testing:
  user: tester
  password: YOUR_TESTER_PASSWORD_HERE
  database: communication
  schema: template

paths:
  jokes_file: data/jokes.json
